<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password - Procezly</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fc;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
        }
        h2 {
            color: #1e2a4a;
            font-size: 24px;
            margin-bottom: 15px;
        }
        p {
            color: #525f7f;
            font-size: 16px;
            margin: 0 0 20px;
        }
        .cta-button {
            display: inline-block;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background: #d9534f;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 10px;
        }
        .cta-button:hover {
            background: #c9302c;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #7b8698;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Reset Your Password</h2>
        <p>We received a request to reset your Procezly account password. Click the button below to proceed:</p>
        <a href="{{ .ConfirmationURL }}" class="cta-button">Reset Password</a>
        <p>If you didn’t request a password reset, you can safely ignore this email. Your password will remain unchanged.</p>
        <div class="footer">
            © 2025 Procezly | A Product of GNT Security
        </div>
    </div>

</body>
</html>
